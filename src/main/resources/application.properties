# Configuraci\u00f3n con valores por defecto para desarrollo local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/siete_store_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto (ya no es necesario especificarlo, Spring lo detecta)
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=update