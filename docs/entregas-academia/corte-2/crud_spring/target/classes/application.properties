spring.application.name=crud_spring
# Conexi\u00f3n a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/crud_spring
spring.datasource.username=root
spring.datasource.password=root123
# Nota: Cambia '123456' por la contrase\u00f1a real de tu usuario root en MySQL

# Hibernate / JPA
# update: Crea las tablas si no existen y las actualiza si modificamos el modelo Java
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola de NetBeans para ver la magia por debajo
spring.jpa.show-sql=true